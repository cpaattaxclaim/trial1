<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title and description — react-helmet-async overrides these per page -->
    <title>TaxClaim | Licensed CPA Tax Services</title>
    <meta name="description" content="TaxClaim provides expert tax preparation, business accounting, and CPA services in San Jose, CA. Book a free consultation today." />
    <meta name="robots" content="index,follow" />

    <!-- Default canonical for homepage — helmet overrides on inner pages -->
    <link rel="canonical" href="https://taxclaim.co/" />

    <!-- Default Open Graph -->
    <meta property="og:site_name" content="TaxClaim" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TaxClaim | Licensed CPA Tax Services" />
    <meta property="og:description" content="TaxClaim provides expert tax preparation, business accounting, and CPA services in San Jose, CA." />
    <meta property="og:url" content="https://taxclaim.co/" />
    <meta property="og:image" content="https://taxclaim.co/favicon.ico" />

    <!-- Default Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@cpaattaxclaim" />
    <meta name="twitter:title" content="TaxClaim | Licensed CPA Tax Services" />
    <meta name="twitter:description" content="TaxClaim provides expert tax preparation, business accounting, and CPA services in San Jose, CA." />

    <!-- Preload logo for LCP -->
    <link rel="preload" as="image" href="/src/assets/Header.webp" />

    <!-- Preconnect to font origins early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the actual font file to break the chain -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/inter/v17/rP2Hp2ywxg0gOXMwwgIr.woff2"
      crossorigin
    />

    <!-- Load font CSS non-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Business structured data — static, never changes per page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "AccountingService",
      "name": "TaxClaim",
      "url": "https://taxclaim.co",
      "logo": "https://taxclaim.co/favicon.ico",
      "image": "https://taxclaim.co/favicon.ico",
      "priceRange": "$$",
      "telephone": "+1 (415) 304-7262",
      "sameAs": [
        "https://x.com/cpaattaxclaim",
        "https://www.facebook.com/TaxClaim.co",
        "https://www.linkedin.com/in/taxclaim/",
        "https://medium.com/@cpa_96374",
        "https://substack.com/@taxclaim",
        "https://www.threads.com/@cpaattaxclaim"
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "3401 Iron Point Drive",
        "addressLocality": "San Jose",
        "addressRegion": "CA",
        "postalCode": "95134",
        "addressCountry": "US"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "09:00",
          "closes": "18:00"
        }
      ],
      "hasCredential": {
        "@type": "EducationalOccupationalCredential",
        "name": "Certified Public Accountant",
        "credentialCategory": "Professional License"
      },
      "mainEntity": {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Are your CPAs licensed?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, all our services are provided by licensed Certified Public Accountants (CPAs)."
            }
          }
        ]
      }
    }
    </script>

    <!-- Google Tag: deferred to avoid blocking render -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-Q7N8E43Q1X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Q7N8E43Q1X');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
